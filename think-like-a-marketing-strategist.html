<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#0B0D12;
    --bg-2:#0F1219;
    --card:#12151C;
    --card-2:#171B24;
    --line:#242A36;
    --text:#E8EAF0;
    --muted:#8A90A6;
    --muted-2:#5C6377;
    --teal:#4FE0C4;
    --teal-dim:#2C7F70;
    --amber:#F2A65A;
    --rose:#E8637A;
    --violet:#9C8CF0;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -5%, rgba(79,224,196,0.07), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(156,140,240,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  ::selection{background:var(--teal); color:#04140F;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}

  .app-shell{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 80px;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:26px;
    flex-wrap:wrap;
  }
  .brandmark{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .brandmark .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 12px rgba(79,224,196,0.8);
  }
  .stage-tracker{
    display:flex; gap:6px; align-items:center;
  }
  .stage-pip{
    width:26px; height:6px; border-radius:4px;
    background:var(--line);
    transition:background 0.4s ease, box-shadow .4s ease;
  }
  .stage-pip.done{ background:var(--teal); box-shadow:0 0 8px rgba(79,224,196,.5); }
  .stage-pip.active{ background:var(--violet); box-shadow:0 0 8px rgba(156,140,240,.6); }

  .panel{
    background:linear-gradient(180deg, var(--card), var(--card-2));
    border:1px solid var(--line);
    border-radius:18px;
    padding:32px;
    position:relative;
    overflow:hidden;
    animation:riseIn .5s cubic-bezier(.19,1,.22,1);
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
  .panel::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(79,224,196,.5), transparent);
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  h1.title{
    font-family:var(--font-display);
    font-size:clamp(28px,4vw,42px);
    line-height:1.08;
    margin:0 0 14px;
    letter-spacing:-0.01em;
  }
  h2.section-title{
    font-family:var(--font-display);
    font-size:clamp(21px,2.6vw,28px);
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  p.lede{
    color:var(--muted);
    font-size:15.5px;
    line-height:1.65;
    max-width:70ch;
    margin:0 0 22px;
  }
  .why-box{
    background:rgba(79,224,196,0.05);
    border:1px solid rgba(79,224,196,0.22);
    border-radius:12px;
    padding:14px 16px;
    margin:16px 0 22px;
    font-size:14px;
    line-height:1.6;
    color:#CFE9E2;
  }
  .why-box b{ color:var(--teal); font-family:var(--font-mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:5px;}
  .what-box{
    background:rgba(156,140,240,0.05);
    border:1px solid rgba(156,140,240,0.22);
    border-radius:12px;
    padding:14px 16px;
    margin:16px 0 10px;
    font-size:14px;
    line-height:1.6;
    color:#D9D4F6;
  }
  .what-box b{ color:var(--violet); font-family:var(--font-mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:5px;}

  .grid{ display:grid; gap:14px; }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  @media (max-width:820px){
    .grid-3{ grid-template-columns:1fr; }
    .grid-2{ grid-template-columns:1fr; }
  }

  .choice-card{
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px 20px;
    cursor:pointer;
    text-align:left;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
    font-family:var(--font-body);
    color:var(--text);
  }
  .choice-card:hover{
    transform:translateY(-3px);
    border-color:var(--teal-dim);
    background:#141924;
  }
  .choice-card.selected{
    border-color:var(--teal);
    background:rgba(79,224,196,0.08);
    box-shadow:0 0 0 1px var(--teal) inset;
  }
  .choice-card .icon{ font-size:26px; margin-bottom:10px; display:block; }
  .choice-card .ctitle{ font-family:var(--font-display); font-size:17px; margin-bottom:5px; }
  .choice-card .cdesc{ font-size:13px; color:var(--muted); line-height:1.5; }

  button.btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:14.5px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--text);
    padding:12px 20px;
    cursor:pointer;
    transition:all .2s ease;
  }
  button.btn:hover{ border-color:var(--teal-dim); background:#141924; }
  button.btn.primary{
    background:var(--teal);
    color:#04140F;
    border-color:var(--teal);
  }
  button.btn.primary:hover{ background:#69ecd3; }
  button.btn.primary:disabled{
    background:var(--line); color:var(--muted-2); border-color:var(--line); cursor:not-allowed;
  }
  button.btn.ghost{ background:transparent; }
  button.btn.small{ padding:8px 14px; font-size:13px; }

  .btnrow{ display:flex; gap:12px; margin-top:28px; flex-wrap:wrap; justify-content:space-between; align-items:center; }
  .btnrow .right{ display:flex; gap:10px; margin-left:auto; }

  .tag{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:11px;
    padding:3px 9px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--muted);
    margin:2px 6px 2px 0;
  }
  .tag.on{ border-color:var(--teal); color:var(--teal); background:rgba(79,224,196,0.08); }

  .prompt-card{
    margin-top:26px;
    background:#0D1015;
    border:1px dashed #33414A;
    border-radius:14px;
    padding:18px 20px;
  }
  .prompt-card .ptitle{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .prompt-text{
    font-family:var(--font-mono);
    font-size:13px;
    line-height:1.65;
    color:#C7CEDA;
    background:#080A0D;
    border-radius:10px;
    padding:14px 16px;
    white-space:pre-wrap;
    border:1px solid #1B222B;
  }
  .copy-btn{
    margin-top:10px;
  }

  .platform-row{
    display:flex; align-items:flex-start; gap:14px;
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:12px;
    transition:border-color .2s ease, background .2s ease;
  }
  .platform-row.selected{ border-color:var(--teal); background:rgba(79,224,196,0.06); }
  .platform-row .picon{ font-size:22px; width:34px; text-align:center; flex-shrink:0; }
  .platform-row .pbody{ flex:1; }
  .platform-row .pname{ font-family:var(--font-display); font-size:16px; margin-bottom:3px; display:flex; align-items:center; gap:10px;}
  .fit-badge{
    font-family:var(--font-mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    padding:2px 8px; border-radius:20px;
  }
  .fit-high{ background:rgba(79,224,196,0.15); color:var(--teal); }
  .fit-mid{ background:rgba(242,166,90,0.15); color:var(--amber); }
  .fit-low{ background:rgba(232,99,122,0.15); color:var(--rose); }
  .platform-row .preason{ font-size:13px; color:var(--muted); line-height:1.55; margin-top:3px;}
  .pick-btn{
    flex-shrink:0;
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--muted);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    transition:all .2s ease;
  }
  .pick-btn.on{ background:var(--teal); border-color:var(--teal); color:#04140F; }

  .pillar-card{
    background:var(--bg-2); border:1px solid var(--line); border-radius:14px;
    padding:18px; cursor:pointer; transition:all .2s ease; position:relative;
  }
  .pillar-card:hover{ transform:translateY(-2px); border-color:var(--teal-dim); }
  .pillar-card.picked{ border-color:var(--teal); background:rgba(79,224,196,0.07); }
  .pillar-card .pnum{
    position:absolute; top:14px; right:16px;
    font-family:var(--font-mono); font-size:11px; color:var(--muted-2);
  }
  .pillar-card .ptitle2{ font-family:var(--font-display); font-size:16.5px; margin:0 0 6px; padding-right:20px;}
  .pillar-card .pgoal{ font-size:12px; color:var(--amber); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;}
  .pillar-card .pdesc{ font-size:13px; color:var(--muted); line-height:1.55; }
  .pillar-count{
    font-family:var(--font-mono); font-size:13px; color:var(--muted);
    margin-bottom:16px;
  }
  .pillar-count b{ color:var(--teal); }

  .week-card{
    background:var(--bg-2); border:1px solid var(--line); border-radius:14px;
    padding:20px; margin-bottom:14px;
    display:grid; grid-template-columns:90px 1fr; gap:18px;
    align-items:start;
  }
  @media (max-width:700px){ .week-card{ grid-template-columns:1fr; } }
  .week-badge{
    font-family:var(--font-display); font-size:15px; color:var(--violet);
    background:rgba(156,140,240,0.1); border:1px solid rgba(156,140,240,0.3);
    border-radius:10px; padding:10px; text-align:center; height:fit-content;
  }
  .week-badge small{ display:block; font-family:var(--font-mono); font-size:9.5px; color:var(--muted); margin-top:3px; letter-spacing:.05em;}
  .week-goal{ font-family:var(--font-display); font-size:16.5px; margin:0 0 6px; }
  .week-desc{ font-size:13.5px; color:var(--muted); line-height:1.6; margin:0; }

  .event-card{
    background:linear-gradient(135deg, rgba(232,99,122,0.08), rgba(242,166,90,0.05));
    border:1px solid rgba(232,99,122,0.3);
    border-radius:16px;
    padding:26px;
    margin-bottom:22px;
  }
  .event-flash{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--rose); display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .pulse{ width:8px; height:8px; border-radius:50%; background:var(--rose); animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(232,99,122,.6);} 70%{box-shadow:0 0 0 8px rgba(232,99,122,0);} 100%{box-shadow:0 0 0 0 rgba(232,99,122,0);} }
  .response-option{
    background:var(--bg-2); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; margin-bottom:10px; cursor:pointer; transition:all .2s ease;
  }
  .response-option:hover{ border-color:var(--amber); }
  .response-option.chosen{ border-color:var(--teal); background:rgba(79,224,196,0.07); }
  .consequence-box{
    margin-top:18px; padding:16px 18px; border-radius:12px;
    background:#0D1015; border-left:3px solid var(--teal);
    font-size:14px; line-height:1.6; color:#D6DAE3;
    animation:riseIn .4s ease;
  }

  .report-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:10px; }
  @media (max-width:760px){ .report-grid{ grid-template-columns:1fr; } }
  .report-card{
    background:var(--bg-2); border:1px solid var(--line); border-radius:14px; padding:18px 20px;
  }
  .report-card .rlabel{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--teal); margin-bottom:8px;
  }
  .report-card.mistake .rlabel{ color:var(--rose); }
  .report-card.decision .rlabel{ color:var(--amber); }
  .report-card p{ font-size:13.5px; line-height:1.6; color:var(--text); margin:0; }

  .meter-wrap{
    display:flex; align-items:center; gap:16px; margin:20px 0 28px;
    background:var(--bg-2); border:1px solid var(--line); border-radius:14px; padding:18px 20px;
  }
  .meter-track{
    flex:1; height:10px; border-radius:6px; background:var(--line); overflow:hidden; position:relative;
  }
  .meter-fill{
    height:100%; border-radius:6px;
    background:linear-gradient(90deg, var(--teal-dim), var(--teal));
    transition:width 1s cubic-bezier(.19,1,.22,1);
  }
  .meter-label{ font-family:var(--font-mono); font-size:13px; color:var(--teal); white-space:nowrap; }

  .lesson-list{ list-style:none; padding:0; margin:0; }
  .lesson-list li{
    display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--line);
    font-size:14.5px; line-height:1.6;
  }
  .lesson-list li:last-child{ border-bottom:none; }
  .lesson-num{
    font-family:var(--font-display); font-size:20px; color:var(--violet); flex-shrink:0; width:28px;
  }

  .business-brief{
    background:var(--bg-2); border:1px solid var(--line); border-radius:14px; padding:20px 22px; margin-bottom:22px;
  }
  .brief-row{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:14px; gap:16px;}
  .brief-row:last-child{ border-bottom:none; }
  .brief-row .k{ color:var(--muted); font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; padding-top:2px;}
  .brief-row .v{ text-align:right; color:var(--text); }

  input.text-input, textarea.text-input{
    width:100%; background:var(--bg-2); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; color:var(--text); font-family:var(--font-body); font-size:14px;
    margin-bottom:12px; resize:vertical;
  }
  input.text-input:focus, textarea.text-input:focus{ outline:none; border-color:var(--teal); }
  label.field-label{
    display:block; font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--muted); margin-bottom:6px;
  }

  .footer-note{
    text-align:center; color:var(--muted-2); font-size:12px; margin-top:30px; font-family:var(--font-mono);
  }
  .restart-fab{
    position:fixed; bottom:20px; right:20px; z-index:50;
  }
  @media (max-width:600px){ .app-shell{ padding:18px 14px 90px; } .panel{ padding:22px 18px; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useMemo, useEffect} = React;

/* ---------------- DATA ---------------- */

const INDUSTRIES = [
  {name:"Cold-Brew Coffee Startup", emoji:"☕", audience:"Urban professionals aged 24-38 who value convenience and quality", budget:"₹2,00,000/month", challenge:"Low brand awareness against big coffee chains"},
  {name:"Handmade Skincare Brand", emoji:"🧴", audience:"Women aged 20-35 interested in clean beauty", budget:"₹80,000/month", challenge:"High customer acquisition cost on paid ads"},
  {name:"Kids' Coding Ed-tech App", emoji:"🧩", audience:"Parents of children aged 8-14 who want future-ready skills for their kids", budget:"₹5,00,000/month", challenge:"Parents don't trust a new, unknown app"},
  {name:"Sustainable Sneaker Brand", emoji:"👟", audience:"Gen Z shoppers aged 18-27 who care about ethical fashion", budget:"₹3,50,000/month", challenge:"Competing against fast-fashion prices"},
  {name:"B2B Invoicing SaaS", emoji:"🧾", audience:"Small business owners and freelance accountants", budget:"₹6,00,000/month", challenge:"Long sales cycle and low brand trust"},
  {name:"Regional Cloud Kitchen Chain", emoji:"🍱", audience:"Working professionals aged 22-40 ordering lunch and dinner", budget:"₹1,50,000/month", challenge:"Thin margins make paid delivery-app ads risky"},
  {name:"Boutique Fitness Studio", emoji:"🏋️", audience:"Health-conscious millennials seeking community over solo workouts", budget:"₹90,000/month", challenge:"Local competition from big-box gyms"},
  {name:"Independent Bookstore & Cafe", emoji:"📚", audience:"Readers, students, and remote workers aged 18-45", budget:"₹40,000/month", challenge:"Foot traffic dropping due to online retailers"},
];

const COMPETITOR_POOL = ["a well-funded national chain","a fast-growing DTC startup","three local players with loyal fans","an influencer-led competitor brand","a legacy brand losing relevance","a low-cost imitator undercutting on price"];

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pickN(arr,n){
  const copy=[...arr]; const out=[];
  while(out.length<n && copy.length){ out.push(copy.splice(Math.floor(Math.random()*copy.length),1)[0]); }
  return out;
}

function generateBusiness(){
  const base = pick(INDUSTRIES);
  return {
    mode:"business",
    name: base.name,
    emoji: base.emoji,
    audience: base.audience,
    budget: base.budget,
    challenge: base.challenge,
    competitors: pickN(COMPETITOR_POOL,2).join(" and "),
  };
}

const PLATFORM_LIB = {
  business: [
    {key:"instagram", icon:"📸", name:"Instagram", strength:["Handmade Skincare Brand","Sustainable Sneaker Brand","Boutique Fitness Studio","Cold-Brew Coffee Startup","Regional Cloud Kitchen Chain","Independent Bookstore & Cafe"], reasonHigh:"Visual products with a lifestyle angle earn attention here — people discover brands through scroll-stopping imagery and short video.", reasonLow:"Without strong visuals or lifestyle appeal, Instagram becomes an expensive popularity contest."},
    {key:"tiktok/reels", icon:"🎬", name:"Short-Form Video (Reels/TikTok)", strength:["Cold-Brew Coffee Startup","Sustainable Sneaker Brand","Boutique Fitness Studio","Kids' Coding Ed-tech App"], reasonHigh:"Short video is the fastest way to reach new audiences organically — the algorithm rewards entertaining or educational hooks over follower count.", reasonLow:"If the product is complex or low-emotion (like enterprise software), snackable video struggles to build real trust."},
    {key:"linkedin", icon:"💼", name:"LinkedIn", strength:["B2B Invoicing SaaS","Kids' Coding Ed-tech App"], reasonHigh:"Decision-makers and professionals research and trust brands here — ideal for B2B credibility and thought leadership.", reasonLow:"Consumer, impulse-driven products rarely get traction with LinkedIn's professional-first audience."},
    {key:"facebook", icon:"📘", name:"Facebook", strength:["Regional Cloud Kitchen Chain","Independent Bookstore & Cafe","Boutique Fitness Studio"], reasonHigh:"Strong for local community-building, events, and reaching an older or family-oriented demographic with reliable ad targeting.", reasonLow:"Younger audiences have largely moved on, so organic reach here is weak for youth-first brands."},
    {key:"youtube", icon:"▶️", name:"YouTube", strength:["Kids' Coding Ed-tech App","B2B Invoicing SaaS","Boutique Fitness Studio"], reasonHigh:"Long-form video builds deep trust through tutorials, demos, and storytelling — perfect when the buying decision needs explanation.", reasonLow:"High production effort for low near-term payoff if the product doesn't need in-depth explanation."},
    {key:"pinterest", icon:"📌", name:"Pinterest", strength:["Handmade Skincare Brand","Independent Bookstore & Cafe","Sustainable Sneaker Brand"], reasonHigh:"People use Pinterest to plan purchases — great for aesthetic, inspiration-driven products with long discovery windows.", reasonLow:"Low intent-to-purchase overlap for fast-moving-food or hyper-local service businesses."},
    {key:"twitter", icon:"🐦", name:"X / Twitter", strength:["B2B Invoicing SaaS","Kids' Coding Ed-tech App"], reasonHigh:"Real-time conversation and thought leadership work well for building a founder-led, opinionated brand voice in tech/B2B.", reasonLow:"Visual, lifestyle-first products get lost in a text-and-news-driven feed."},
  ],
  personal: [
    {key:"linkedin", icon:"💼", name:"LinkedIn", weight:3, reasonHigh:"This is where your professional reputation compounds — ideal for sharing lessons, career updates, and thought leadership tied to your niche.", reasonLow:"Skip only if your niche is purely entertainment with zero professional angle."},
    {key:"twitter", icon:"🐦", name:"X / Twitter", weight:3, reasonHigh:"Best place to build in public — quick thoughts, threads, and replies help you get discovered by people already discussing your niche.", reasonLow:"Less useful if you prefer long-form, deeply-researched formats over fast conversation."},

/* ---------------- SMALL COMPONENTS ---------------- */

function StageTracker({stage, total}){
  return (
    <div className="stage-tracker">
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} className={"stage-pip " + (i<stage ? "done" : i===stage ? "active" : "")}></div>
      ))}
    </div>
  );
}

function AskClaudeCard({title, prompt}){
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    navigator.clipboard?.writeText(prompt).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false), 1600);
  };
  return (
    <div className="prompt-card">
      <div className="ptitle">🧠 How to ask Claude — {title}</div>
      <div className="prompt-text">{prompt}</div>
      <button className="btn small copy-btn" onClick={doCopy}>{copied ? "Copied ✓" : "Copy Prompt"}</button>
    </div>
  );
}

function WhatWhy({what, why}){
  return (
    <React.Fragment>
      <div className="what-box"><b>What is this?</b>{what}</div>
      <div className="why-box"><b>Why it matters</b>{why}</div>
    </React.Fragment>
  );
}

function Meter({value, label}){
  return (
    <div className="meter-wrap">
      <div className="meter-track"><div className="meter-fill" style={{width: value+"%"}}></div></div>
      <div className="meter-label">{label}</div>
    </div>
  );
}

/* ---------------- MAIN APP ---------------- */

const STAGE_NAMES = ["Welcome","Brand","Platforms","Pillars","Roadmap","Curveball","Report"];

function App(){
  const [stage, setStage] = useState(0);
  const [mode, setMode] = useState(null); // 'business' | 'personal'
  const [business, setBusiness] = useState(null);
  const [personal, setPersonal] = useState({name:"", niche:"", story:""});
  const [selectedPlatforms, setSelectedPlatforms] = useState([]);
  const [selectedPillars, setSelectedPillars] = useState([]);
  const [chosenEvent, setChosenEvent] = useState(null);
  const [eventResponse, setEventResponse] = useState(null);
  const [seed, setSeed] = useState(0);

  const isPersonal = mode === "personal";
  const brandName = isPersonal ? (personal.name || "Your Personal Brand") : (business ? business.name : "");
  const brandNiche = isPersonal ? (personal.niche || "your niche") : "";

  const platformList = useMemo(()=>{
    const lib = isPersonal ? PLATFORM_LIB.personal : PLATFORM_LIB.business;
    if(isPersonal){
      return lib.map(p=>({...p, fit: p.weight>=3 ? "high" : "mid"}));
    } else if(business){
      return lib.map(p=>({...p, fit: p.strength.includes(business.name) ? "high" : (Math.random()>0.5 ? "mid":"low")}));
    }
    return lib;
  },[mode, business, seed]);

  const pillarList = isPersonal ? PILLARS_PERSONAL : PILLARS_BUSINESS;
  const weekList = isPersonal ? WEEKS_PERSONAL : WEEKS_BUSINESS;
  const eventPool = isPersonal ? EVENTS_PERSONAL : EVENTS_BUSINESS;

  useEffect(()=>{
    if(stage===5 && !chosenEvent){
      setChosenEvent(pick(eventPool));
    }
  },[stage]);

  function togglePlatform(key){
    setSelectedPlatforms(prev => prev.includes(key) ? prev.filter(k=>k!==key) : [...prev, key]);
  }
  function togglePillar(key){
    setSelectedPillars(prev=>{
      if(prev.includes(key)) return prev.filter(k=>k!==key);
      if(prev.length>=3) return prev;
      return [...prev, key];
    });
  }

  function restart(){
    setStage(0); setMode(null); setBusiness(null);
    setPersonal({name:"",niche:"",story:""});
    setSelectedPlatforms([]); setSelectedPillars([]);
    setChosenEvent(null); setEventResponse(null);
    setSeed(s=>s+1);
  }

  function goto(n){ setStage(n); window.scrollTo({top:0, behavior:"smooth"}); }

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="brandmark"><span className="dot"></span> STRATEGY SIMULATOR</div>
        {stage>0 && <StageTracker stage={stage} total={STAGE_NAMES.length} />}
      </div>

      {stage===0 && <Welcome onPick={(m)=>{
        setMode(m);
        if(m==="business"){ setBusiness(generateBusiness()); }
        goto(1);
      }} />}

      {stage===1 && (
        <BrandStage
          mode={mode}
          business={business}
          personal={personal}
          setPersonal={setPersonal}
          onRegenerate={()=>setBusiness(generateBusiness())}
          onNext={()=>goto(2)}
        />
      )}

      {stage===2 && (
        <PlatformStage
          isPersonal={isPersonal}
          platformList={platformList}
          selected={selectedPlatforms}
          onToggle={togglePlatform}
          brandName={brandName}
          brandNiche={brandNiche}
          onBack={()=>goto(1)}
          onNext={()=>goto(3)}
        />
      )}

      {stage===3 && (
        <PillarStage
          pillars={pillarList}
          selected={selectedPillars}
          onToggle={togglePillar}
          brandName={brandName}
          isPersonal={isPersonal}
          onBack={()=>goto(2)}
          onNext={()=>goto(4)}
        />
      )}

      {stage===4 && (
        <RoadmapStage
          weeks={weekList}
          isPersonal={isPersonal}
          brandName={brandName}
          onBack={()=>goto(3)}
          onNext={()=>goto(5)}
        />
      )}

      {stage===5 && chosenEvent && (
        <EventStage
          event={chosenEvent}
          response={eventResponse}
          setResponse={setEventResponse}
          brandName={brandName}
          isPersonal={isPersonal}
          onBack={()=>goto(4)}
          onNext={()=>goto(6)}
        />
      )}

      {stage===6 && (
        <ReportStage
          mode={mode}
          business={business}
          personal={personal}
          selectedPlatforms={selectedPlatforms}
          platformList={platformList}
          selectedPillars={selectedPillars}
          pillarList={pillarList}
          chosenEvent={chosenEvent}
          eventResponse={eventResponse}
          onRestart={restart}
        />
      )}

      {stage>0 && (
        <div className="footer-note">STAGE {stage} / {STAGE_NAMES.length-1} — {STAGE_NAMES[stage].toUpperCase()}</div>
      )}
    </div>
  );
}

      <h1 className="title">Think Like a Marketing Strategist:<br/>Grow This Brand</h1>

          <div className="ctitle">Use My Own Business</div>
          <div className="cdesc">Bring your own product or company and build a real strategy around it.</div>
        </button>
        <button className="choice-card" onClick={()=>onPick("personal")}>
          <span className="icon">🙋</span>
          <div className="ctitle">Build My Personal Brand</div>
          <div className="cdesc">No business? Use your own name, expertise, and story as the brand instead.</div>
        </button>
        <button className="choice-card" onClick={()=>onPick("business")}>
          <span className="icon">🎲</span>
          <div className="ctitle">A New Client Has Arrived</div>
          <div className="cdesc">We'll randomly generate a business — industry, audience, budget, and a real challenge.</div>
        </button>
      </div>
      <AskClaudeCard
        title="Getting started"

/* ---------------- STAGE 1: BRAND UNDERSTANDING ---------------- */

function BrandStage({mode, business, personal, setPersonal, onRegenerate, onNext}){
  const isPersonal = mode==="personal";
  const canProceed = isPersonal ? (personal.name.trim() && personal.niche.trim()) : !!business;

  return (
    <div className="panel">
      <div className="eyebrow">◆ Step 1 — Understand the Brand</div>
      <h2 className="section-title">{isPersonal ? "Tell us about you" : "Meet your client"}</h2>
      <WhatWhy
        what={isPersonal
          ? "Defining your niche, expertise, and story — this is the raw material of a personal brand, replacing 'product' and 'competitors.'"
          : "A profile of the business: what it sells, who buys it, how much it can spend, and what's standing in its way."}
        why={isPersonal
          ? "You can't build content people care about until you're specific about what you know and why anyone should listen. Vague experts get ignored; specific ones get remembered."
          : "Every strategy decision — platforms, content, budget — flows from understanding who the audience is and what obstacle the brand actually faces. Skip this step and every later decision is a guess."}
      />

      {!isPersonal && business && (
        <div className="business-brief">
          <div className="brief-row"><span className="k">Business</span><span className="v">{business.emoji} {business.name}</span></div>
          <div className="brief-row"><span className="k">Audience</span><span className="v">{business.audience}</span></div>
          <div className="brief-row"><span className="k">Monthly Budget</span><span className="v">{business.budget}</span></div>
          <div className="brief-row"><span className="k">Competitors</span><span className="v">{business.competitors}</span></div>
          <div className="brief-row"><span className="k">Challenge</span><span className="v">{business.challenge}</span></div>
        </div>
      )}
      {!isPersonal && (
        <button className="btn small ghost" onClick={onRegenerate}>🎲 Generate a Different Client</button>
      )}

      {isPersonal && (
        <div style={{marginTop:10}}>
          <label className="field-label">Your Name</label>
          <input className="text-input" placeholder="e.g. Priya Sharma" value={personal.name}
            onChange={e=>setPersonal({...personal, name:e.target.value})} />
          <label className="field-label">Your Niche / Expertise (this replaces "product")</label>
          <input className="text-input" placeholder="e.g. Personal finance for freelancers" value={personal.niche}
            onChange={e=>setPersonal({...personal, niche:e.target.value})} />
          <label className="field-label">Your Story (this replaces "competitors" — who inspires you?)</label>
          <textarea className="text-input" rows="3" placeholder="e.g. Self-taught after struggling with irregular income for 3 years. I admire how [creator] breaks down complex topics simply."
            value={personal.story} onChange={e=>setPersonal({...personal, story:e.target.value})} />
          <div className="why-box" style={{marginTop:4}}>
            <b>Note</b> Instead of "competitors," think of "people in your space you admire" — in personal branding, you're not fighting for market share, you're finding your own distinct voice within a community.
          </div>
        </div>
      )}

      <div className="btnrow">
        <div></div>
        <div className="right">
          <button className="btn primary" disabled={!canProceed} onClick={onNext}>Continue to Platforms →</button>
        </div>
      </div>

      <AskClaudeCard
        title="Understanding the audience"
        prompt={isPersonal
          ? `I'm building a personal brand around ${personal.name || "[your name]"} in the niche of ${personal.niche || "[your niche]"}. Help me identify: who exactly is my target audience, what do they struggle with, and what makes my perspective different from others in this space?`
          : `I'm analyzing a business for a marketing strategy exercise: ${business ? business.name : "[business name]"}, targeting ${business ? business.audience : "[audience]"} with a monthly budget of ${business ? business.budget : "[budget]"}. Help me break down their target audience's needs, pain points, and buying behavior.`}
      />
    </div>
  );
}

/* ---------------- STAGE 2: PLATFORMS ---------------- */

function PlatformStage({isPersonal, platformList, selected, onToggle, brandName, brandNiche, onBack, onNext}){
  return (
    <div className="panel">
      <div className="eyebrow">◆ Step 2 — Choose the Right Platforms</div>
      <h2 className="section-title">Where should {brandName} actually show up?</h2>
      <WhatWhy
        what="Picking which social platforms deserve time and budget, based on audience fit — not personal preference or trends."
        why={isPersonal
          ? "A personal brand can't be everywhere at once. The strongest personal brands go deep on 1-2 platforms that match their format and niche, rather than spreading thin across all of them."
          : "Every platform has a different audience, format, and buying intent. Choosing the wrong one wastes budget and content effort chasing people who were never going to buy."}
      />
      <p className="lede" style={{marginTop:4}}>Tap the checkmark to select a platform. Read the reasoning — strategists always explain the "why," never just the "what."</p>

      {platformList.map(p=>{
        const isSel = selected.includes(p.key);
        const fitLabel = p.fit==="high" ? "Strong Fit" : p.fit==="mid" ? "Possible Fit" : "Weak Fit";
        const fitClass = p.fit==="high" ? "fit-high" : p.fit==="mid" ? "fit-mid" : "fit-low";
        return (
          <div key={p.key} className={"platform-row " + (isSel ? "selected" : "")}>
            <div className="picon">{p.icon}</div>
            <div className="pbody">
              <div className="pname">{p.name} <span className={"fit-badge "+fitClass}>{fitLabel}</span></div>
              <div className="preason">{p.fit==="high" ? p.reasonHigh : p.reasonLow}</div>
            </div>
            <button className={"pick-btn " + (isSel?"on":"")} onClick={()=>onToggle(p.key)}>{isSel ? "✓" : "+"}</button>
          </div>
        );
      })}

      <div className="btnrow">
        <button className="btn ghost" onClick={onBack}>← Back</button>
        <div className="right">
          <button className="btn primary" disabled={selected.length===0} onClick={onNext}>Continue to Content Pillars →</button>
        </div>
      </div>

      <AskClaudeCard
        title="Choosing platforms"
        prompt={isPersonal
          ? `I'm building a personal brand as ${brandName} in the niche of ${brandNiche || "[your niche]"}. Given my niche, which 2 platforms should I focus on first, and why? Explain the trade-offs of spreading across too many platforms early.`
          : `For ${brandName}, targeting the audience I described, which social platforms should I prioritize and why? Explain which platforms would be a poor fit and why, so I understand the reasoning, not just the recommendation.`}
      />
    </div>
  );
}

      <h2 className="section-title">What will {brandName} actually talk about?</h2>

        why="Random content with no theme confuses an audience about what a brand stands for. Choosing a focused set of pillars — each tied to a specific goal like trust, reach, or sales — turns content into a system instead of guesswork."
      />
      <p className="lede" style={{marginTop:4}}>Choose exactly <b style={{color:"var(--teal)"}}>three</b> pillars. Fewer means underusing your content mix; more means the message gets diluted.</p>

      <div className="pillar-count">Selected: <b>{selected.length} / 3</b></div>

              style={disabled ? {opacity:0.45, cursor:"not-allowed"} : {}}

              <span className="pnum">{String(i+1).padStart(2,'0')}</span>
              <div className="ptitle2">{p.title}</div>

              <div className="pdesc">{p.desc}</div>
            </div>
          );
        })}
      </div>

      <div className="btnrow">
        <button className="btn ghost" onClick={onBack}>← Back</button>
        <div className="right">
          <button className="btn primary" disabled={selected.length!==3} onClick={onNext}>Continue to Roadmap →</button>
        </div>
      </div>

      <AskClaudeCard
        title="Choosing content pillars"
        prompt={isPersonal
          ? `I'm building a personal brand as ${brandName}. Suggest 3 content pillars I should focus on out of: Thought Leadership, Personal Story, Behind the Scenes, Audience Education, Community, and Results/Proof. Explain which goal each one serves (authority, connection, trust, etc.) so I can pick the right mix for my current stage.`
          : `For ${brandName}, help me choose 3 content pillars from options like Product Education, Social Proof, Behind the Scenes, Offers, Brand Values, and Trends. Explain what business goal each pillar serves so I can build a balanced content mix.`}
      />
    </div>
  );
}

/* ---------------- STAGE 4: ROADMAP ---------------- */

function RoadmapStage({weeks, isPersonal, brandName, onBack, onNext}){
  return (
    <div className="panel">
      <div className="eyebrow">◆ Step 4 — 30-Day Roadmap</div>
      <h2 className="section-title">A month of intentional growth for {brandName}</h2>
      <WhatWhy
        what="A weekly plan showing what to prioritize each week — not a list of individual posts, but the underlying strategy shift week to week."
        why="Beginners plan post-by-post and burn out. Strategists plan phase-by-phase: each week has one job (build trust, build reach, convert) and content decisions follow from that job."
      />

      {weeks.map((w,i)=>(
        <div className="week-card" key={i}>
          <div className="week-badge">{w.w}<small>PHASE {i+1}</small></div>
          <div>
            <div className="week-goal">{w.goal}</div>
            <p className="week-desc">{w.desc}</p>
          </div>
        </div>
      ))}

      <div className="btnrow">
        <button className="btn ghost" onClick={onBack}>← Back</button>
        <div className="right">
          <button className="btn primary" onClick={onNext}>Continue: An Unexpected Event →</button>
        </div>
      </div>

      <AskClaudeCard
        title="Building a content roadmap"
        prompt={isPersonal
          ? `Build me a 4-week content roadmap for my personal brand as ${brandName}. Week 1 should focus on defining my point of view and optimizing my bio. Give me a strategic goal for each week, not individual post ideas.`
          : `Build me a 4-week content roadmap for ${brandName}. Give me a strategic goal for each week (like building trust, then reach, then conversion) rather than a list of individual daily posts.`}
      />
    </div>
  );
}

/* ---------------- STAGE 5: UNEXPECTED EVENT ---------------- */

function EventStage({event, response, setResponse, brandName, isPersonal, onBack, onNext}){
  const chosenOutcome = response!==null ? event.options[response] : null;
  return (
    <div className="panel">
      <div className="eyebrow">◆ Step 5 — Adapt Under Pressure</div>
      <h2 className="section-title">Real marketing rarely goes to plan</h2>
      <WhatWhy
        what="A sudden, unplanned event that disrupts the roadmap — and a decision about how to respond."
        why="Plans are a starting point, not a guarantee. What separates a strategist from someone just following a checklist is how they adapt when reality throws a curveball."
      />

      <div className="event-card">
        <div className="event-flash"><span className="pulse"></span> Breaking: Unexpected Event</div>
        <h3 style={{fontFamily:"var(--font-display)", fontSize:20, margin:"0 0 8px"}}>{event.title}</h3>
        <p style={{fontSize:14, color:"var(--muted)", lineHeight:1.6, margin:"0 0 18px"}}>{event.detail}</p>

        {event.options.map((opt,i)=>(
          <div key={i} className={"response-option " + (response===i ? "chosen":"")} onClick={()=>setResponse(i)}>
            <strong style={{fontSize:14}}>{opt.label}</strong>
          </div>
        ))}

        {chosenOutcome && (
          <div className="consequence-box">
            <b style={{color:"var(--teal)", fontFamily:"var(--font-mono)", fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:6}}>Consequence</b>
            {chosenOutcome.outcome}
          </div>
        )}
      </div>

      <div className="btnrow">
        <button className="btn ghost" onClick={onBack}>← Back</button>
        <div className="right">
          <button className="btn primary" disabled={response===null} onClick={onNext}>See Growth Report →</button>
        </div>
      </div>

      <AskClaudeCard
        title="Handling a crisis or opportunity"
        prompt={isPersonal
          ? `Something unexpected just happened to my personal brand as ${brandName}: [describe the event]. Walk me through 2-3 possible ways to respond and the likely consequence of each, so I can think through trade-offs before acting.`
          : `Something unexpected just happened to ${brandName}: [describe the event]. Walk me through 2-3 possible ways to respond and the likely consequence of each, so I can think through trade-offs before acting.`}
      />
    </div>
  );
}

/* ---------------- STAGE 6: GROWTH REPORT ---------------- */

function ReportStage({mode, business, personal, selectedPlatforms, platformList, selectedPillars, pillarList, chosenEvent, eventResponse, onRestart}){
  const isPersonal = mode==="personal";
  const brandName = isPersonal ? (personal.name || "Your Personal Brand") : (business ? business.name : "");
  const lib = REPORT_LIB[mode] || REPORT_LIB.business;

  const platformNames = platformList.filter(p=>selectedPlatforms.includes(p.key)).map(p=>p.name).join(", ");
  const pillarNames = pillarList.filter(p=>selectedPillars.includes(p.key)).map(p=>p.title).join(", ");
  const eventChoice = chosenEvent && eventResponse!==null ? chosenEvent.options[eventResponse] : null;

  const growthScore = useMemo(()=>{
    let score = 55;
    score += selectedPlatforms.length * 6;
    score += selectedPillars.length * 5;
    if(eventResponse!==null) score += 10;
    return Math.min(96, score);
  },[selectedPlatforms, selectedPillars, eventResponse]);

  const bestDecision = eventChoice ? eventChoice.label : "Choosing platforms based on audience fit rather than personal preference.";
  const biggestMistakeText = isPersonal
    ? "Trying to sound like an authority on everything instead of staying anchored to one clear, specific niche."
    : "Assuming more platforms automatically means more growth — without matching effort to where the audience actually is.";

  return (
    <div className="panel">
      <div className="eyebrow">◆ Final Report</div>
      <h1 className="title">Growth Report: {brandName}</h1>
      <p className="lede">Here's the strategic snapshot based on every decision you made in this simulation.</p>

      <Meter value={growthScore} label={"Growth Potential Score: " + growthScore + "/100"} />

      <div className="report-grid">
        <div className="report-card">
          <div className="rlabel">Audience Understanding</div>
          <p>{isPersonal
            ? `You defined ${brandName}'s niche as "${personal.niche || "a specific area of expertise"}" — clarity here is what will make the right people stop scrolling.`
            : `You identified ${business ? business.audience : "a specific target audience"} as the core buyer — every later decision should keep tracing back to this group.`}</p>
        </div>
        <div className="report-card">
          <div className="rlabel">Platform Strategy</div>
          <p>You chose to focus on: <b>{platformNames || "no platforms selected"}</b>. {isPersonal ? "Depth on fewer platforms usually beats a thin presence everywhere." : "This mix should match where your audience already spends attention."}</p>
        </div>
        <div className="report-card">
          <div className="rlabel">Content Strategy</div>
          <p>Your three pillars: <b>{pillarNames || "no pillars selected"}</b>. Together, these should cover both attention (reach) and trust (credibility) — not just one or the other.</p>
        </div>
        <div className="report-card">
          <div className="rlabel">Growth Potential</div>
          <p>A {growthScore}/100 score reflects platform focus, content balance, and how well you adapted to the unexpected event. Real growth compounds from consistent, aligned decisions like these.</p>
        </div>
      </div>

      <div className="report-grid" style={{marginTop:4}}>
        <div className="report-card decision">
          <div className="rlabel">Best Decision</div>
          <p>{bestDecision}</p>
        </div>
        <div className="report-card mistake">
          <div className="rlabel">Watch Out For</div>
          <p>{biggestMistakeText}</p>
        </div>
      </div>

      <h2 className="section-title" style={{marginTop:28}}>Three Marketing Lessons</h2>
      <ul className="lesson-list">
        {lib.lessons.map((l,i)=>(
          <li key={i}><span className="lesson-num">{i+1}</span><span>{l}</span></li>
        ))}
      </ul>

      <AskClaudeCard
        title="Turning this into a real plan"
        prompt={isPersonal
          ? `Based on this simulation, help me turn my personal brand strategy for ${brandName} in the niche of ${personal.niche || "[your niche]"} into a real, actionable first-month plan I can actually execute, including specific post ideas for each of my 3 chosen pillars.`
          : `Based on this simulation, help me turn my marketing strategy for ${brandName} into a real, actionable first-month plan I can actually execute, including specific post ideas for each of my 3 chosen content pillars.`}
      />

      <div className="btnrow">
        <div></div>
        <div className="right">
          <button className="btn primary" onClick={onRestart}>🔁 Start a New Simulation</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
